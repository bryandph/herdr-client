name: Update herdr

# Tracks new herdr releases end-to-end, hands-off: bump the herdr flake input,
# re-dump its schema, regenerate the typed client, bump the crate version to the
# new herdr version, then VALIDATE (fmt · clippy · test). Only if everything
# passes does it commit to main and cut the matching release. If herdr is
# unchanged the run no-ops; if validation fails, nothing lands and the run goes
# red for a human to look at (e.g. a breaking protocol change).

on:
  schedule:
    - cron: "0 7 * * 1" # weekly Mon 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-herdr
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache /nix/store
        uses: nix-community/cache-nix-action@v7
        with:
          # herdr's build (not on cache.nixos.org) is the expensive part; keep it
          # across runs. flake.lock is hashed at checkout, before the herdr bump.
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 7G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Bump herdr · refresh schema · regenerate · version
        run: |
          nix flake update herdr
          nix run .#refresh-schema
          nix develop --command ./scripts/regen.sh
          # Track the crate version to the (new) herdr version.
          sys=$(nix eval --impure --raw --expr builtins.currentSystem)
          ver=$(nix eval --raw ".#herdrVersion.$sys")
          python3 - "$ver" <<'PY'
          import re, sys
          ver = sys.argv[1]
          s = open("Cargo.toml").read()
          s = re.sub(r'(?m)^version = "[^"]*"', f'version = "{ver}"', s, count=1)
          open("Cargo.toml", "w").write(s)
          print(f"crate version -> {ver}")
          PY
          nix develop --command cargo check --quiet
          echo "HERDR_VER=$ver" >> "$GITHUB_ENV"

      - name: Validate (build · clippy · test)
        run: |
          nix develop --command bash -euo pipefail -c '
            cargo fmt --check
            cargo clippy --all-targets -- -D warnings
            cargo test
          '

      - name: Commit + release (only if herdr changed and validation passed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "herdr unchanged — nothing to update"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "herdr: update to ${HERDR_VER} (refresh schema, regenerate, release)"
          git push origin HEAD:main
          # Direct-to-main pushes by GITHUB_TOKEN don't trigger release.yml, so
          # cut the release here (idempotent — skip if the tag already exists).
          tag="v${HERDR_VER}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
            exit 0
          fi
          proto=$(grep -oE 'PROTOCOL: u32 = [0-9]+' src/generated/protocol.rs | grep -oE '[0-9]+$')
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "herdr-client $tag (herdr ${HERDR_VER} · protocol $proto)" \
            --generate-notes
